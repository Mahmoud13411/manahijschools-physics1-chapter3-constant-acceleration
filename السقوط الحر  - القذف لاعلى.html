<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي قذف الأجسام للأعلى</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-info {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
            line-height: 1.4;
        }

        .header-info h3 { margin: 5px 0; }
        .header-info p { margin: 2px 0; font-weight: bold; }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .problem-card {
            background: #ecf0f1;
            padding: 1.5rem;
            border-right: 5px solid var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .simulation-area {
            position: relative;
            height: 350px;
            background: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #bdc3c7;
            margin-bottom: 20px;
        }

        #ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #e67e22;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            bottom: 10px;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 10px;
            background: #7f8c8d;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-new { background: var(--primary-color); color: white; }
        .btn-play { background: #27ae60; color: white; }
        .btn-answer { background: #f39c12; color: white; }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .result-box {
            margin-top: 20px;
            padding: 1rem;
            display: none;
            background: #dff9fb;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header-info">
    <h3>شركة عطاء التعليمية</h3>
    <h3>مدارس المناهج الثانوية بنين</h3>
    <p>إعداد المعلم أ/ محمود شفيق مشرف</p>
</div>

<div class="container">
    <h2 style="text-align: center; color: var(--primary-color);">تدريبات قذف الأجسام رأسيًا للأعلى 🚀</h2>
    
    <div class="problem-card" id="problem-text">
        اضغط على "مسألة جديدة" للبدء..
    </div>

    <div class="simulation-area">
        <div id="ball"></div>
        <div class="ground"></div>
    </div>

    <div class="controls">
        <button class="btn-new" onclick="generateProblem()">مسألة جديدة</button>
        <button class="btn-play" id="playBtn" disabled onclick="startAnimation()">تشغيل الأنيميشن</button>
        <button class="btn-answer" id="showBtn" disabled onclick="toggleAnswer()">إظهار الحل</button>
    </div>

    <div class="result-box" id="result"></div>
</div>

<script>
    let currentProblem = {};
    const g = 9.8; 

    function generateProblem() {
        const types = ['find_max_h', 'find_total_t', 'find_v_initial'];
        const type = types[Math.floor(Math.random() * types.length)];
        
        const v_i = (Math.random() * 20 + 15).toFixed(1); 
        const t_up = (v_i / g).toFixed(1); 
        const max_h = (Math.pow(v_i, 2) / (2 * g)).toFixed(1); 
        const total_t = (t_up * 2).toFixed(1); 

        const ball = document.getElementById('ball');
        ball.style.display = 'block';
        ball.style.transition = 'none'; 
        ball.style.bottom = '10px'; 
        
        document.getElementById('result').style.display = 'none';
        document.getElementById('playBtn').disabled = false;
        document.getElementById('showBtn').disabled = false;

        if (type === 'find_max_h') {
            currentProblem = {
                text: `قُذف جسم رأسيًا للأعلى بسرعة ابتدائية قدرها <b>(${v_i} m/s)</b>. احسب أقصى ارتفاع يصل إليه الجسم؟`,
                answer: `أقصى ارتفاع (h) = v_i² / 2g <br> h = (${v_i})² / (2 × 9.8) = <b>${max_h} m</b>`,
                t_up: parseFloat(t_up)
            };
        } else if (type === 'find_total_t') {
            currentProblem = {
                text: `قُذف سهم للأعلى بسرعة ابتدائية <b>(${v_i} m/s)</b>. ما هو الزمن الكلي المستغرق ليعود إلى نقطة القذف؟`,
                answer: `زمن الصعود (t_up) = v_i / g = ${v_i} / 9.8 = ${t_up} s <br> الزمن الكلي = 2 × زمن الصعود = <b>${total_t} s</b>`,
                t_up: parseFloat(t_up)
            };
        } else {
            currentProblem = {
                text: `قُذف حجر للأعلى فوصل إلى أقصى ارتفاع قدره <b>(${max_h} m)</b>. ما هي السرعة التي قُذف بها الحجر؟`,
                answer: `السرعة الابتدائية (v_i) = √(2 × g × h) <br> v_i = √(2 × 9.8 × ${max_h}) = <b>${v_i} m/s</b>`,
                t_up: parseFloat(t_up)
            };
        }

        document.getElementById('problem-text').innerHTML = currentProblem.text;
    }

    function startAnimation() {
        const ball = document.getElementById('ball');
        const playBtn = document.getElementById('playBtn');
        const maxHeightPx = 300; 
        
        playBtn.disabled = true; // تعطيل الزر أثناء الحركة
        
        // مرحلة الصعود (تباطؤ)
        ball.style.transition = `bottom ${currentProblem.t_up}s ease-out`;
        ball.style.bottom = maxHeightPx + 'px';

        // مرحلة الهبوط (تسارع) تبدأ بعد انتهاء الصعود مباشرة
        setTimeout(() => {
            ball.style.transition = `bottom ${currentProblem.t_up}s ease-in`;
            ball.style.bottom = '10px';
            
            // إعادة تفعيل الزر بعد انتهاء الحركة كاملة
            setTimeout(() => {
                playBtn.disabled = false;
            }, currentProblem.t_up * 1000);
            
        }, currentProblem.t_up * 1000);
    }

    function toggleAnswer() {
        const resBox = document.getElementById('result');
        resBox.innerHTML = currentProblem.answer;
        resBox.style.display = resBox.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
