<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي تدريبات السقوط الحر</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-info {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
            line-height: 1.4;
        }

        .header-info h3 { margin: 5px 0; }
        .header-info p { margin: 2px 0; font-weight: bold; }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .problem-card {
            background: #ecf0f1;
            padding: 1.5rem;
            border-right: 5px solid var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .simulation-area {
            position: relative;
            height: 300px;
            background: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #bdc3c7;
            margin-bottom: 20px;
        }

        #ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--accent-color);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            top: 10px;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 10px;
            background: #7f8c8d;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-new { background: var(--primary-color); color: white; }
        .btn-play { background: #27ae60; color: white; }
        .btn-answer { background: #f39c12; color: white; }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .result-box {
            margin-top: 20px;
            padding: 1rem;
            display: none;
            background: #dff9fb;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header-info">
    <h3>شركة عطاء التعليمية</h3>
    <h3>مدارس المناهج الثانوية بنين</h3>
    <h3>قسم الفيزياء</h3>
    <p>إعداد المعلم أ/ محمود شفيق مشرف</p>
</div>

<div class="container">
    <h2 style="text-align: center; color: var(--primary-color);">تدريبات السقوط الحر 🏀</h2>
    
    <div class="problem-card" id="problem-text">
        اضغط على "مسألة جديدة" للبدء..
    </div>

    <div class="simulation-area">
        <div id="ball"></div>
        <div class="ground"></div>
    </div>

    <div class="controls">
        <button class="btn-new" onclick="generateProblem()">مسألة جديدة</button>
        <button class="btn-play" id="playBtn" disabled onclick="startAnimation()">تشغيل الأنيميشن</button>
        <button class="btn-answer" id="showBtn" disabled onclick="toggleAnswer()">إظهار الحل</button>
    </div>

    <div class="result-box" id="result"></div>
</div>

<script>
    let currentProblem = {};
    const g = 9.8; 

    function generateProblem() {
        const types = ['find_v', 'find_t', 'find_d'];
        const type = types[Math.floor(Math.random() * types.length)];
        
        const t = (Math.random() * 4 + 1).toFixed(1); 
        const v = (t * g).toFixed(1);
        const d = (0.5 * g * Math.pow(t, 2)).toFixed(1);

        const ball = document.getElementById('ball');
        ball.style.top = '10px';
        ball.style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('playBtn').disabled = false;
        document.getElementById('showBtn').disabled = false;

        if (type === 'find_v') {
            currentProblem = {
                text: `سقط جسم من السكون سقطاً حراً، فإذا استغرق زمن قدره <b>(${t} s)</b> ليصل إلى الأرض. احسب سرعته النهائية لحظة الاصطدام؟`,
                answer: `السرعة النهائية (v_f) = g × t <br> v_f = 9.8 × ${t} = <b>${v} m/s</b>`,
                duration: t
            };
        } else if (type === 'find_d') {
            currentProblem = {
                text: `سقط حجر من قمة مبنى واستغرق <b>(${t} s)</b> ليصل إلى القاعدة. ما هو ارتفاع المبنى؟`,
                answer: `الارتفاع (d) = ½ × g × t² <br> d = 0.5 × 9.8 × (${t})² = <b>${d} m</b>`,
                duration: t
            };
        } else {
            currentProblem = {
                text: `إذا سقط جسم من ارتفاع <b>(${d} m)</b> عن سطح الأرض. ما الزمن المستغرق للوصول للأرض؟ (بإهمال مقاومة الهواء)`,
                answer: `الزمن (t) = √(2d / g) <br> t = √(2 × ${d} / 9.8) = <b>${t} s</b>`,
                duration: t
            };
        }

        document.getElementById('problem-text').innerHTML = currentProblem.text;
    }

    function startAnimation() {
        const ball = document.getElementById('ball');
        const areaHeight = 260; 
        
        ball.style.transition = `top ${currentProblem.duration}s cubic-bezier(0.5, 0, 1, 0.5)`;
        setTimeout(() => {
            ball.style.top = areaHeight + 'px';
        }, 10);
    }

    function toggleAnswer() {
        const resBox = document.getElementById('result');
        resBox.innerHTML = currentProblem.answer;
        resBox.style.display = resBox.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
