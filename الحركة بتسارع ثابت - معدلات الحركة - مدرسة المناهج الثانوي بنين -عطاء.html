<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تدريبات معادلات الحركة - أ/ محمود شفيق</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-info {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .header-info h3 { margin: 5px 0; }
        .header-info p { margin: 2px 0; font-weight: bold; }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 850px;
        }

        .problem-card {
            background: #ecf0f1;
            padding: 1.5rem;
            border-right: 5px solid var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.3rem;
            min-height: 100px;
            line-height: 1.8;
            color: #2c3e50;
        }

        .simulation-area {
            position: relative;
            height: 150px;
            background: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
            border-bottom: 4px solid #7f8c8d;
            margin-bottom: 20px;
        }

        #car {
            position: absolute;
            width: 60px;
            height: 30px;
            background: #c0392b;
            bottom: 10px;
            left: 10px;
            border-radius: 5px 15px 5px 5px;
        }

        #car::after, #car::before { 
            content: ''; position: absolute; width: 12px; height: 12px; 
            background: #333; border-radius: 50%; bottom: -6px; border: 2px solid white;
        }
        #car::after { left: 5px; }
        #car::before { right: 5px; }

        .controls { display: flex; gap: 10px; justify-content: center; }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-new { background: var(--primary-color); color: white; }
        .btn-play { background: #27ae60; color: white; }
        .btn-answer { background: #f39c12; color: white; }

        button:disabled { background: #ccc; cursor: not-allowed; }

        .result-box {
            margin-top: 20px;
            padding: 1.5rem;
            display: none;
            background: #dff9fb;
            border-radius: 8px;
            border: 1px solid #c7ecee;
            font-size: 1.1rem;
        }

        .formula { direction: ltr; font-family: 'Courier New', monospace; color: #c0392b; font-weight: bold; }
        .math-block { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header-info">
    <h3>شركة عطاء التعليمية</h3>
    <h3>مدارس المناهج الثانوية بنين</h3>
    <p>إعداد المعلم أ/ محمود شفيق مشرف</p>
</div>

<div class="container">
    <h2 style="text-align: center; color: var(--primary-color);">تدريبات معادلات الحركة (مسائل كلامية) ✍️</h2>
    
    <div class="problem-card" id="problem-text">
        اضغط على "مسألة جديدة" للبدء..
    </div>

    <div class="simulation-area">
        <div id="car"></div>
    </div>

    <div class="controls">
        <button class="btn-new" onclick="generateProblem()">مسألة جديدة</button>
        <button class="btn-play" id="playBtn" disabled onclick="startAnimation()">تشغيل الأنيميشن</button>
        <button class="btn-answer" id="showBtn" disabled onclick="toggleAnswer()">إظهار الحل والمطلوب</button>
    </div>

    <div class="result-box" id="result"></div>
</div>

<script>
    let currentData = {};

    function generateProblem() {
        const types = [1, 2, 3]; 
        const type = types[Math.floor(Math.random() * types.length)];
        
        // توليد معطيات فيزيائية منطقية
        const vi = Math.floor(Math.random() * 11); // من 0 إلى 10
        const a = Math.floor(Math.random() * 5) + 1; // من 1 إلى 5
        const t = Math.floor(Math.random() * 6) + 2; // من 2 إلى 7
        
        // حساب القيم بدقة
        const vf = vi + (a * t);
        const d = (vi * t) + (0.5 * a * Math.pow(t, 2));

        const car = document.getElementById('car');
        car.style.transition = 'none';
        car.style.left = '10px';
        document.getElementById('result').style.display = 'none';
        document.getElementById('playBtn').disabled = false;
        document.getElementById('showBtn').disabled = false;

        let text = "";
        let solution = "";

        // تحويل الحالة الصفرية لكلمة "السكون"
        const viText = vi === 0 ? "من السكون" : `بسرعة متجهة ابتدائية مقدارها ${vi} m/s`;

        if (type === 1) {
            text = `انطلقت سيارة سباق ${viText}، فإذا كانت تتحرك بتسارع ثابت مقداره ${a} m/s²، فاحسب مقدار سرعتها النهائية بعد مرور زمن قدره ${t} ثوانٍ.`;
            solution = `
                <b>المطلوب:</b> السرعة النهائية (v<sub>f</sub>)<br>
                <b>القانون المستخدم:</b> <span class="formula">v<sub>f</sub> = v<sub>i</sub> + a·t</span><br>
                <div class="math-block">
                v<sub>f</sub> = ${vi} + (${a} × ${t}) <br>
                v<sub>f</sub> = ${vi} + ${a*t} = <b>${vf} m/s</b>
                </div>`;
        } else if (type === 2) {
            text = `تحرك جسم ${viText} وبتسارع ثابت مقداره ${a} m/s². ما مقدار الإزاحة التي يقطعها هذا الجسم خلال زمن قدره ${t} ثوانٍ من بدء الحركة؟`;
            solution = `
                <b>المطلوب:</b> الإزاحة (d)<br>
                <b>القانون المستخدم:</b> <span class="formula">d = v<sub>i</sub>·t + ½·a·t²</span><br>
                <div class="math-block">
                d = (${vi} × ${t}) + (0.5 × ${a} × ${t}²) <br>
                d = ${vi*t} + (0.5 × ${a} × ${t*t}) <br>
                d = ${vi*t} + ${0.5 * a * t * t} = <b>${d} m</b>
                </div>`;
        } else {
            text = `بدأت شاحنة حركتها ${viText} وتسارعت بمقدار ثابت قيمته ${a} m/s² حتى قطعت إزاحة قدرها ${d} متر. احسب مقدار السرعة النهائية التي وصلت إليها الشاحنة.`;
            solution = `
                <b>المطلوب:</b> السرعة النهائية (v<sub>f</sub>)<br>
                <b>القانون المستخدم:</b> <span class="formula">v<sub>f</sub>² = v<sub>i</sub>² + 2·a·d</span><br>
                <div class="math-block">
                v<sub>f</sub>² = ${vi}² + (2 × ${a} × ${d}) <br>
                v<sub>f</sub>² = ${vi*vi} + ${2*a*d} = ${vf*vf} <br>
                v<sub>f</sub> = √${vf*vf} = <b>${vf} m/s</b>
                </div>`;
        }

        currentData = { t: t, a: a, vi: vi };
        document.getElementById('problem-text').innerHTML = text;
        document.getElementById('result').innerHTML = solution;
    }

    function startAnimation() {
        const car = document.getElementById('car');
        const playBtn = document.getElementById('playBtn');
        playBtn.disabled = true;

        // الأنيميشن يحاكي التسارع
        car.style.transition = `left ${currentData.t}s ease-in`;
        
        setTimeout(() => {
            car.style.left = 'calc(100% - 80px)';
        }, 50);

        setTimeout(() => {
            playBtn.disabled = false;
        }, currentData.t * 1000);
    }

    function toggleAnswer() {
        const resBox = document.getElementById('result');
        resBox.style.display = resBox.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
